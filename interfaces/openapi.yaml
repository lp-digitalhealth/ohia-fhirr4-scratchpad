    ODEDentalClaim:
      type: object
      description: 'Non-financial, oral-optimized ExplanationOfBenefit. Derived from CARIN Blue Button''s
        C4BB-ExplanationOfBenefit-Professional-NonClinician-Basis profile, extended with oral must-support
        elements. NOT a claim submission: status is always draft, outcome is always queued. No unitPrice/net/total.
        Diagnosis is always present when known but only REQUIRED when the receiving payer is medical.
        CDT coding in item.productOrService is always required (HIPAA); CPT/HCPCS is included alongside
        it wherever a crosswalk is knowable.'
      x-fhir-profile: https://oralhealthalliance.net/fhir/StructureDefinition/ode-dental-claim
      x-derived-from: http://hl7.org/fhir/us/carin-bb/StructureDefinition/C4BB-ExplanationOfBenefit-Professional-NonClinician-Basis
      required:
      - resourceType
      - status
      - type
      - use
      - patient
      - insurer
      - provider
      - item
      properties:
        resourceType:
          type: string
          enum:
          - ExplanationOfBenefit
        identifier:
          type: array
          items:
            $ref: '#/components/schemas/Identifier'
        status:
          type: string
          enum:
          - draft
          description: Always 'draft' — this is not a submission.
        type:
          $ref: '#/components/schemas/CodeableConcept'
          description: Fixed to professional-oriented claim type per the base profile.
        use:
          type: string
          enum:
          - claim
        patient:
          $ref: '#/components/schemas/Reference'
        billablePeriod:
          type: object
          properties:
            start:
              type: string
              format: date
            end:
              type: string
              format: date
        created:
          type: string
          format: date
        insurer:
          $ref: '#/components/schemas/Reference'
        provider:
          $ref: '#/components/schemas/Reference'
        outcome:
          type: string
          enum:
          - queued
          description: Always 'queued' — adjudication has not occurred.
        careTeam:
          type: array
          description: Includes both referring and rendering/performing roles.
          items:
            type: object
            properties:
              sequence:
                type: integer
              provider:
                $ref: '#/components/schemas/Reference'
              responsible:
                type: boolean
              role:
                type: object
                description: CARIN BB C4BBClaimCareTeamRole — e.g. 'referring', 'rendering', 'performing'.
                properties:
                  coding:
                    type: array
                    items:
                      $ref: '#/components/schemas/Coding'
        supportingInfo:
          type: array
          description: Includes servicefacility (maps to CMS-1500 Box 32).
          items:
            type: object
        diagnosis:
          type: array
          description: Always present when known. REQUIRED when the receiving payer is medical; payer's-discretion
            for dental-only payers.
          items:
            type: object
            properties:
              sequence:
                type: integer
              diagnosisCodeableConcept:
                $ref: '#/components/schemas/CodeableConcept'
        insurance:
          type: array
          items:
            type: object
            properties:
              focal:
                type: boolean
              coverage:
                $ref: '#/components/schemas/Reference'
        item:
          type: array
          items:
            type: object
            required:
            - sequence
            - productOrService
            - bodySite
            properties:
              sequence:
                type: integer
              productOrService:
                type: object
                description: MUST include a CDT coding (always required, per HIPAA). SHOULD include a
                  CPT/HCPCS coding alongside it wherever a crosswalk is knowable.
                properties:
                  coding:
                    type: array
                    items:
                      $ref: '#/components/schemas/Coding'
              bodySite:
                type: object
                description: REQUIRED (must-support). Uses ONLY the ADA Universal Tooth Designation System
                  (http://terminology.hl7.org/CodeSystem/ADAUniversalToothDesignationSystem) — confirmed
                  directly with the ADA that FDI notation is not used for US dental data.
                properties:
                  coding:
                    type: array
                    items:
                      $ref: '#/components/schemas/Coding'
              servicedDate:
                type: string
                format: date
              locationCodeableConcept:
                $ref: '#/components/schemas/CodeableConcept'
              modifier:
                type: array
                items:
                  $ref: '#/components/schemas/CodeableConcept'
                description: 'Service/product billing modifiers — the real, pre-existing base FHIR element
                  (Claim.item.modifier / ExplanationOfBenefit.item.modifier, 0..* CodeableConcept). Added
                  specifically to carry the KX modifier: confirmed against CMS''s own guidance that KX
                  is required (as of 2025-07-01) on whichever claim form is used (837D, 837P, or 837I),
                  and against Humana''s own MA policy requiring KX appended to a CDT code.'
              quantity:
                type: object
                properties:
                  value:
                    type: number
                description: Count only — NOT pricing.
