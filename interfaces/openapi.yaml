openapi: 3.0.3
info:
  title: Oral Health Data Exchange (ODE) API
  version: 0.4.0-draft
  description: 'REST contract for the **Oral Health Data Exchange (ODE)** — a definitive oral-health data
    model ("USCDI + Dental"), the oral-health analog of US Core. Almost every resource inherits from a
    US Core profile; only `Task` (the COW workflow object) and `List` (the medication list) inherit base
    FHIR.

    **Three referral profiles, one per direction that involves dental** (like CARIN Blue Button''s per-claim-type
    family): - `ODEMedicalToDentalReferral` — medical system refers to a dentist. - `ODEDentalToDentalReferral`
    — dentist refers to a dentist. - `ODEDentalToMedicalReferral` — dentist refers to a physician (e.g.
    UC05 OSA screen).

    **Unifying coding rule** — each referral is coded for the world the *receiving clinician* acts and
    bills in: where a medical party acts/bills (medical→dental, dental→medical) **ICD-10-CM + CPT/HCPCS
    are must-support and CDT is not**; **dental→dental makes CDT must-support** (SNODENT should). SNODENT
    rides along as should-support to preserve a dental finding into a medical context.

    **Imaging by direction** — dental→dental uses **support-a-pull** (receiver retrieves via CDex); whenever
    the **receiver is on the medical side** (medical→dental, dental→medical) it exposes no inbound pull,
    so images follow as a **separate `$submit-attachment` push** after the referral. The clinical substance
    (screening result, note) always travels in the referral.

    **Interim content and information requests** — per the base Clinical Order Workflows IG''s "Requesting
    additional information" pattern (RESTful query / letter / instruction), a fulfiller may need data
    not in the original referral package. The *request* itself is a `note` (no dedicated resource); the
    *resulting* clinical content (once obtained) attaches to the referral via `POST /Task/{id}/$append-interim`,
    which is the ODE-native equivalent of a 360X PCC-59 (Interim Consultation Note) — usable with or without
    a bridge.

    Schemas are representative (key elements plus examples); authoritative element-level conformance lives
    in the ODE profiles referenced by each schema''s `x-fhir-profile`.

    '
  contact:
    name: Oral Health Interoperability Alliance (OHIA)
    url: https://oralhealthalliance.net
externalDocs:
  description: ODE IG profiles & conformance (IG-development spec)
  url: https://oralhealthalliance.net/fhir
servers:
- url: https://ode.example.org/fhir
  description: ODE Native FHIR base (example)
tags:
- name: Capability
  description: Server capability discovery
- name: Referral
  description: The referral order (ServiceRequest) — three directional profiles
- name: Workflow
  description: The referral Task — the ODE/COW workflow object and source of truth for state
- name: Medications
  description: The medication list (List + US Core MedicationRequest)
- name: Clinical Content
  description: 'Encounter, DiagnosticReport, and Observation — clinical findings that arise during a referral
    episode but aren''t part of the initial referral submission. Typically attached to an open referral''s
    Task via $append-interim.

    '
- name: Attachments
  description: 'Supporting documents & imaging. Dental→dental = support-a-pull (read/search below); medical-side
    receivers = separate $submit-attachment push after the referral.

    '
- name: Notifications
  description: Topic-based Subscriptions on referral status
- name: Claims Sharing
  description: Non-financial, oral-optimized ExplanationOfBenefit — a dental-first "claims-ready" package
    derived from CARIN Blue Button's Professional/NonClinician Basis profile, extended with oral must-support
    elements (tooth bodySite, dual CDT+CPT coding). Designed so a receiving system (medical or dental
    payer, or a clearinghouse) can construct its own final claim (837D, 837P/CMS-1500, or a fully-priced
    FHIR Claim) without OHIA making pricing, adjudication, or code-system-choice decisions on their behalf.
    Financial fields (unitPrice, net, total, adjudication) are intentionally absent in this iteration;
    the shape is designed to accept them in a future Connectathon without restructuring.
security:
- smartOnFhir: []
paths:
  /metadata:
    get:
      tags:
      - Capability
      operationId: getCapabilityStatement
      summary: Fetch the server CapabilityStatement
      security: []
      responses:
        '200':
          description: CapabilityStatement
          content:
            application/fhir+json:
              schema:
                type: object
  /:
    post:
      tags:
      - Referral
      operationId: submitReferralBundle
      summary: Submit a referral as a transaction Bundle
      description: 'POST a transaction `Bundle` containing one referral `ServiceRequest` (one of the three
        directional profiles), one `ODEReferralTask` (status=requested), and the US Core clinical context
        (Patient, Practitioner/Organization, Condition, MedicationRequest, the `ODEMedicationList`, AllergyIntolerance).
        For dental→medical, the screening result (Observation + RiskAssessment) travels here too. This
        is what the 360X bridge produces from a PCC-55. For adding clinical content to a referral already
        in progress (not the initial submission), use `POST /Task/{id}/$append-interim` instead.

        '
      requestBody:
        required: true
        content:
          application/fhir+json:
            schema:
              $ref: '#/components/schemas/Bundle'
            examples:
              transactionBundle:
                $ref: '#/components/examples/referralBundle'
      responses:
        '200':
          description: transaction-response Bundle
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/Bundle'
        '400':
          $ref: '#/components/responses/OperationOutcome'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /ServiceRequest:
    post:
      tags:
      - Referral
      operationId: createReferral
      summary: Create a referral (one of three directional profiles)
      description: 'Create a single referral. Select the directional profile via `meta.profile`; each
        has its own must-support.

        **Medical→dental:** ICD-10-CM `reasonCode` + CPT/HCPCS `code`, no CDT. **Dental→dental:** CDT
        `code` + tooth `bodySite` required, SNODENT should, no medical codes required. **Dental→medical:**
        ICD-10-CM `reasonCode` + CPT/HCPCS `code` (SNODENT should), and the screening result in `supportingInfo`.

        '
      requestBody:
        required: true
        content:
          application/fhir+json:
            schema:
              oneOf:
              - $ref: '#/components/schemas/ODEMedicalToDentalReferral'
              - $ref: '#/components/schemas/ODEDentalToDentalReferral'
              - $ref: '#/components/schemas/ODEDentalToMedicalReferral'
            examples:
              medicalToDental:
                $ref: '#/components/examples/medicalToDentalReferral'
              dentalToDental:
                $ref: '#/components/examples/dentalToDentalReferral'
              dentalToMedical:
                $ref: '#/components/examples/dentalToMedicalReferral'
      responses:
        '201':
          description: Created
          content:
            application/fhir+json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/ODEMedicalToDentalReferral'
                - $ref: '#/components/schemas/ODEDentalToDentalReferral'
                - $ref: '#/components/schemas/ODEDentalToMedicalReferral'
        '400':
          $ref: '#/components/responses/OperationOutcome'
        '401':
          $ref: '#/components/responses/Unauthorized'
    get:
      tags:
      - Referral
      operationId: searchReferral
      summary: Search referrals
      parameters:
      - $ref: '#/components/parameters/referralId'
      - $ref: '#/components/parameters/patient'
      - $ref: '#/components/parameters/status'
      responses:
        '200':
          description: searchset Bundle of ServiceRequest
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/Bundle'
  /ServiceRequest/{id}:
    get:
      tags:
      - Referral
      operationId: readReferral
      summary: Read a referral by id
      parameters:
      - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: ServiceRequest (one of the three directional profiles)
          content:
            application/fhir+json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/ODEMedicalToDentalReferral'
                - $ref: '#/components/schemas/ODEDentalToDentalReferral'
                - $ref: '#/components/schemas/ODEDentalToMedicalReferral'
        '404':
          $ref: '#/components/responses/NotFound'
  /Task:
    get:
      tags:
      - Workflow
      operationId: searchTask
      summary: Search referral Tasks (follow status)
      description: The Task is the single source of truth for referral state. Search by `referral-id`
        to follow a referral end to end.
      parameters:
      - $ref: '#/components/parameters/referralId'
      - $ref: '#/components/parameters/status'
      - $ref: '#/components/parameters/patient'
      responses:
        '200':
          description: searchset Bundle of Task
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/Bundle'
  /Task/{id}:
    get:
      tags:
      - Workflow
      operationId: readTask
      summary: Read a Task by id
      parameters:
      - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Task
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/ODEReferralTask'
              examples:
                task:
                  $ref: '#/components/examples/referralTask'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags:
      - Workflow
      operationId: updateTask
      summary: Advance the workflow (full update)
      description: 'Move the referral through the loop: `requested -> accepted -> in-progress -> completed`
        (or `rejected` / `cancelled`). Each status change is what the bridge mirrors outbound as a 360X
        transaction (PCC-56/57/58/59).

        '
      parameters:
      - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/fhir+json:
            schema:
              $ref: '#/components/schemas/ODEReferralTask'
            examples:
              accept:
                summary: Accept the referral
                value:
                  resourceType: Task
                  id: task-REF-2026-002
                  status: accepted
                  intent: order
                  businessStatus:
                    coding:
                    - system: http://ohia-codes.org/CodeSystem/ode-referral-sub-status
                      code: scheduled
                      display: Scheduled
      responses:
        '200':
          description: Updated Task
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/ODEReferralTask'
        '400':
          $ref: '#/components/responses/OperationOutcome'
    patch:
      tags:
      - Workflow
      operationId: patchTask
      summary: Patch Task status or note
      description: 'Supports partial updates including appending a `note` — e.g. an informal inter-provider
        information request per the base COW "Requesting additional information" pattern (see the `requestAdditionalInfo`
        example). This is the correct mechanism for the *request* itself; the resulting clinical content,
        once obtained, is attached separately via `$append-interim`.

        '
      parameters:
      - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json-patch+json:
            schema:
              type: array
              items:
                type: object
            examples:
              statusChange:
                summary: Advance status
                value:
                - op: replace
                  path: /status
                  value: in-progress
              requestAdditionalInfo:
                summary: Append an information request note (COW "letter" mechanism)
                value:
                - op: add
                  path: /note/-
                  value:
                    text: 'Requesting site-specific radiation dose data at tooth #30 from FCCC Medical
                      Physics to determine extraction vs. preservation. Informal inter-provider request,
                      not a formal order — see base COW IG "Requesting additional information" pattern.

                      '
      responses:
        '200':
          description: Patched Task
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/ODEReferralTask'
  /Task/{id}/$append-interim:
    post:
      tags:
      - Workflow
      operationId: appendInterimContent
      summary: Attach interim clinical content to an open referral
      description: 'Creates the supplied resources (Encounter, DiagnosticReport, Observation, etc.), attaches
        them to `Task.output`, and advances `businessStatus` (typically to `interim-results`). This is
        the ODE-native equivalent of what a 360X bridge does for PCC-59 (Interim Consultation Note) —
        but usable directly, with no bridge or HL7v2 message required. Use this when new clinical findings
        arise mid-referral, as opposed to `POST /` which is for the initial referral submission only.

        '
      parameters:
      - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/fhir+json:
            schema:
              $ref: '#/components/schemas/Bundle'
            examples:
              interimContent:
                $ref: '#/components/examples/interimContentBundle'
      responses:
        '200':
          description: Updated Task, with output populated
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/ODEReferralTask'
        '400':
          $ref: '#/components/responses/OperationOutcome'
        '404':
          $ref: '#/components/responses/NotFound'
  /Encounter:
    post:
      tags:
      - Clinical Content
      operationId: createEncounter
      summary: Create an Encounter
      requestBody:
        required: true
        content:
          application/fhir+json:
            schema:
              $ref: '#/components/schemas/ODEEncounter'
      responses:
        '201':
          description: Created
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/ODEEncounter'
        '400':
          $ref: '#/components/responses/OperationOutcome'
    get:
      tags:
      - Clinical Content
      operationId: searchEncounter
      summary: Search Encounters
      parameters:
      - $ref: '#/components/parameters/patient'
      - $ref: '#/components/parameters/referralId'
      responses:
        '200':
          description: searchset Bundle of Encounter
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/Bundle'
  /Encounter/{id}:
    get:
      tags:
      - Clinical Content
      operationId: readEncounter
      summary: Read an Encounter by id
      parameters:
      - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: ODEEncounter
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/ODEEncounter'
        '404':
          $ref: '#/components/responses/NotFound'
  /DiagnosticReport:
    post:
      tags:
      - Clinical Content
      operationId: createDiagnosticReport
      summary: Create a DiagnosticReport
      requestBody:
        required: true
        content:
          application/fhir+json:
            schema:
              $ref: '#/components/schemas/ODEDiagnosticReport'
      responses:
        '201':
          description: Created
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/ODEDiagnosticReport'
        '400':
          $ref: '#/components/responses/OperationOutcome'
    get:
      tags:
      - Clinical Content
      operationId: searchDiagnosticReport
      summary: Search DiagnosticReports
      parameters:
      - $ref: '#/components/parameters/patient'
      - name: encounter
        in: query
        schema:
          type: string
          example: Encounter/example
        description: Reference search by Encounter
      responses:
        '200':
          description: searchset Bundle of DiagnosticReport
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/Bundle'
  /DiagnosticReport/{id}:
    get:
      tags:
      - Clinical Content
      operationId: readDiagnosticReport
      summary: Read a DiagnosticReport by id
      parameters:
      - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: ODEDiagnosticReport
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/ODEDiagnosticReport'
        '404':
          $ref: '#/components/responses/NotFound'
  /Observation:
    post:
      tags:
      - Clinical Content
      operationId: createObservation
      summary: Create an Observation
      description: 'Includes clinical findings with no established LOINC code (e.g. site-specific radiation
        dosimetry for pre-radiation dental clearance) — use `code.text` when no coding is available; do
        not fabricate a LOINC code. See UC01 Interaction 2 for a worked example of this exact scenario.

        '
      requestBody:
        required: true
        content:
          application/fhir+json:
            schema:
              $ref: '#/components/schemas/ODEObservation'
      responses:
        '201':
          description: Created
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/ODEObservation'
        '400':
          $ref: '#/components/responses/OperationOutcome'
    get:
      tags:
      - Clinical Content
      operationId: searchObservation
      summary: Search Observations
      parameters:
      - $ref: '#/components/parameters/patient'
      - name: encounter
        in: query
        schema:
          type: string
          example: Encounter/example
      responses:
        '200':
          description: searchset Bundle of Observation
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/Bundle'
  /Observation/{id}:
    get:
      tags:
      - Clinical Content
      operationId: readObservation
      summary: Read an Observation by id
      parameters:
      - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: ODEObservation
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/ODEObservation'
        '404':
          $ref: '#/components/responses/NotFound'
  /MedicationRequest:
    get:
      tags:
      - Medications
      operationId: getMedicationList
      summary: Retrieve the medication list (by patient)
      description: 'The patient''s active medications — the medication-list entries. Returns a searchset
        Bundle of US Core MedicationRequest (ordered and patient-reported via `reportedBoolean`). The
        aggregated list is also available as `List` (see `GET /List/{id}`), and travels inside the referral
        Bundle as `ODEMedicationList`.

        '
      parameters:
      - $ref: '#/components/parameters/patient'
      - name: status
        in: query
        schema:
          type: string
          example: active
      responses:
        '200':
          description: searchset Bundle of MedicationRequest
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/Bundle'
              examples:
                medicationList:
                  $ref: '#/components/examples/medicationListBundle'
  /List/{id}:
    get:
      tags:
      - Medications
      operationId: readMedicationList
      summary: Read the medication List resource
      parameters:
      - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: ODEMedicationList
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/ODEMedicationList'
  /DocumentReference/{id}:
    get:
      tags:
      - Attachments
      operationId: readDocumentReference
      summary: Retrieve a supporting document/image (dental→dental pull)
      description: 'The **support-a-pull** path for **dental→dental**: the referral references the image
        and the receiver retrieves it here (or via a CDex Task Data Request). Dental systems can serve
        a pull; medical-side receivers instead get a push (see $submit-attachment).

        '
      parameters:
      - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: DocumentReference (ODEReferralDocumentReference)
          content:
            application/fhir+json:
              schema:
                type: object
        '404':
          $ref: '#/components/responses/NotFound'
  /DocumentReference/$submit-attachment:
    post:
      tags:
      - Attachments
      operationId: submitAttachment
      summary: Push a supporting image (separate push — medical-side receivers)
      description: 'Da Vinci CDex `$submit-attachment` — the **separate-push** imaging path used whenever
        the **receiver is on the medical side** (medical→dental and dental→medical): images follow as
        a distinct transaction *after* the referral, correlated by referral-id, because the medical side
        exposes no inbound pull. Small images embed as `attachment.data`; large images/DICOM use `attachment.url`
        (a FHIR `Binary`, an `ImagingStudy` + WADO-RS endpoint, or a bridge capability link). Dental→dental
        does NOT use this — it uses a pull (see GET /DocumentReference/{id}).

        '
      requestBody:
        required: true
        content:
          application/fhir+json:
            schema:
              $ref: '#/components/schemas/Parameters'
            example:
              resourceType: Parameters
              parameter:
              - name: referral-id
                valueIdentifier:
                  system: urn:ohia:referral-id
                  value: REF-2026-001
              - name: attachment
                resource:
                  resourceType: DocumentReference
                  meta:
                    profile:
                    - https://oralhealthalliance.net/fhir/StructureDefinition/ode-referral-documentreference
                  status: current
                  category:
                  - text: imaging
                  content:
                  - attachment:
                      contentType: image/jpeg
                      title: Panoramic radiograph
                      url: https://ode.example.org/fhir/Binary/pano-001
      responses:
        '200':
          description: OperationOutcome (accepted)
          content:
            application/fhir+json:
              schema:
                type: object
  /Subscription:
    post:
      tags:
      - Notifications
      operationId: createSubscription
      summary: Subscribe to referral status changes
      description: Topic-based subscription on `ode-referral-status`; fires on Task status/businessStatus
        change.
      requestBody:
        required: true
        content:
          application/fhir+json:
            schema:
              type: object
            example:
              resourceType: Subscription
              status: requested
              topic: https://oralhealthalliance.net/fhir/SubscriptionTopic/ode-referral-status
              reason: Follow referral REF-2026-002
              channel:
                type: rest-hook
                endpoint: https://initiator.example.org/notify
                payload: application/fhir+json
      responses:
        '201':
          description: Created Subscription
          content:
            application/fhir+json:
              schema:
                type: object
  /ExplanationOfBenefit:
    post:
      tags:
      - Claims Sharing
      operationId: createClaimsSharingEOB
      summary: Create a non-financial, oral-optimized ExplanationOfBenefit
      description: Creates the claims-ready data package described in ODEDentalClaim. This is
        NOT a claim submission and carries no pricing/adjudication.
      requestBody:
        required: true
        content:
          application/fhir+json:
            schema:
              $ref: '#/components/schemas/ODEDentalClaim'
            examples:
              johnSmithClaimsSharing:
                $ref: '#/components/examples/oralProfessionalEobExample'
      responses:
        '201':
          description: Created
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/ODEDentalClaim'
        '400':
          $ref: '#/components/responses/OperationOutcome'
        '401':
          $ref: '#/components/responses/Unauthorized'
    get:
      tags:
      - Claims Sharing
      operationId: searchClaimsSharingEOB
      summary: Search claims-sharing ExplanationOfBenefit resources
      parameters:
      - $ref: '#/components/parameters/patient'
      - name: encounter
        in: query
        schema:
          type: string
          example: Encounter/example
        description: Reference search by the Encounter this claims-sharing package relates to
      responses:
        '200':
          description: searchset Bundle of ExplanationOfBenefit
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/Bundle'
  /ExplanationOfBenefit/{id}:
    get:
      tags:
      - Claims Sharing
      operationId: readClaimsSharingEOB
      summary: Read a claims-sharing ExplanationOfBenefit by id
      parameters:
      - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: ODEDentalClaim
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/ODEDentalClaim'
        '404':
          $ref: '#/components/responses/NotFound'
components:
  securitySchemes:
    smartOnFhir:
      type: oauth2
      description: SMART on FHIR (SMART App Launch / Backend Services)
      flows:
        authorizationCode:
          authorizationUrl: https://ode.example.org/auth/authorize
          tokenUrl: https://ode.example.org/auth/token
          scopes:
            system/ServiceRequest.rs: Read/search referrals
            system/Task.cruds: Manage the referral workflow
            system/MedicationRequest.rs: Read the medication list
            system/DocumentReference.crs: Read or submit attachments
            system/Encounter.crs: Read or submit encounters
            system/DiagnosticReport.crs: Read or submit diagnostic reports
            system/Observation.crs: Read or submit observations
  parameters:
    id:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Resource logical id
    referralId:
      name: referral-id
      in: query
      schema:
        type: string
        example: urn:ohia:referral-id|REF-2026-002
      description: Token search on the ODE referral identifier (system|value)
    patient:
      name: patient
      in: query
      schema:
        type: string
        example: Patient/example
      description: Reference search by patient
    status:
      name: status
      in: query
      schema:
        type: string
        example: active
      description: Token search on status
  responses:
    OperationOutcome:
      description: Bad request — FHIR OperationOutcome
      content:
        application/fhir+json:
          schema:
            $ref: '#/components/schemas/OperationOutcome'
    Unauthorized:
      description: Missing or invalid SMART token
    NotFound:
      description: Resource not found
  schemas:
    Coding:
      type: object
      properties:
        system:
          type: string
        code:
          type: string
        display:
          type: string
    CodeableConcept:
      type: object
      properties:
        coding:
          type: array
          items:
            $ref: '#/components/schemas/Coding'
        text:
          type: string
    Reference:
