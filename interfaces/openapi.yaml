    ODEMedicalToDentalReferral:
      description: 'Medical system -> dentist. **Must-support:** ICD-10-CM `reasonCode` + CPT/HCPCS `code`
        (so the dentist bills medically without lookup); **CDT is NOT must-support**. Tooth is *should*
        (the medical sender often won''t know it). Imaging is a **separate push** after the referral.
        Radiation dosimetry for clearance is required-when- applicable but currently unmodeled.

        '
      x-fhir-profile: https://oralhealthalliance.net/fhir/StructureDefinition/ode-medical-to-dental-referral
      allOf:
      - $ref: '#/components/schemas/ODEReferralBase'
      - type: object
        required:
        - reasonCode
        - code
    ODEDentalToDentalReferral:
      description: 'Dentist -> dentist. **Must-support:** CDT `code` + tooth `bodySite` (you cannot extract
        "a tooth"); **SNODENT should**; medical codes not required. Supporting imaging uses **support-a-pull**
        (receiver retrieves via CDex). Pre-procedure risk observations are should-populate.

        '
      x-fhir-profile: https://oralhealthalliance.net/fhir/StructureDefinition/ode-dental-to-dental-referral
      allOf:
      - $ref: '#/components/schemas/ODEReferralBase'
      - type: object
        required:
        - code
        - bodySite
    ODEDentalToMedicalReferral:
      description: 'Dentist -> physician (e.g. OSA screen -> sleep medicine). The physician bills medically,
        so **must-support:** ICD-10-CM `reasonCode` + CPT/HCPCS `code`; **SNODENT should** (preserve dental
        origin); **CDT not required**. The **screening result** (Observation + RiskAssessment) is must-support
        and travels in `supportingInfo` (AI-result shape is a gap). Imaging is a **separate push**. Coverage
        is cross-benefit.

        '
      x-fhir-profile: https://oralhealthalliance.net/fhir/StructureDefinition/ode-dental-to-medical-referral
      allOf:
      - $ref: '#/components/schemas/ODEReferralBase'
      - type: object
        required:
        - reasonCode
        - code
        - supportingInfo
