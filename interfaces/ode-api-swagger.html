<div id="ode-header">
  <h1>Oral Health Data Exchange (ODE) API</h1>
  <p>USCDI + Dental &middot; inherits US Core &middot; three referral profiles &middot;
     <b>medical&#8594;dental / dental&#8594;medical = ICD-10-CM + CPT/HCPCS</b> (push imaging) &nbsp;|&nbsp;
     <b>dental&#8594;dental = CDT</b> + tooth (pull imaging)</p>

function loadScript(src){return new Promise(function(res,rej){var s=document.createElement('script');s.src=src;s.onload=res;s.onerror=function(){rej(new Error('fail '+src));};document.head.appendChild(s);});}

async function boot(){

function esc(s){return String(s).replace(/[&<>]/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]);});}

function renderOp(path,m,op){

  h+='</table>';

function renderStatic(){
