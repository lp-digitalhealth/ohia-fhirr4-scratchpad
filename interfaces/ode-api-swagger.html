<div id="ode-header">
  <h1>Oral Health Data Exchange (ODE) API</h1>
  <p>USCDI + Dental &middot; inherits US Core &middot; three referral profiles &middot;
     <b>medical&#8594;dental / dental&#8594;medical = ICD-10-CM + CPT/HCPCS</b> (push imaging) &nbsp;|&nbsp;
     <b>dental&#8594;dental = CDT</b> + tooth (pull imaging) &middot; $append-interim &middot; claims sharing (ODEDentalClaim)</p>
</div>

    params.forEach(function(p){h+='<tr><td>'+esc(p.name||'')+'</td><td>'+esc(p['in']||'')+'</td><td>'+esc((p.schema&&p.schema.type)||'')+'</td><td>'+esc(p.description||'')+'</td></tr>';});h+='</table>';}
  if(op.requestBody){var c=op.requestBody.content||{};var mt=Object.keys(c)[0]||'';var media=c[mt]||{};
    h+='<div class="sub">Request body <span class="mt">'+esc(mt)+'</span></div>';
    if(media.examples){Object.keys(media.examples).forEach(function(k){var ev=media.examples[k];var e=ev['$ref']?rref(ev['$ref']):ev;h+='<div class="ex-label">'+esc(e.summary||k)+'</div><pre>'+jj(e.value)+'</pre>';});}
    else if(media.example!==undefined){h+='<pre>'+jj(media.example)+'</pre>';}
    else if(media.schema){h+='<div class="schema-ref">schema: '+esc(media.schema['$ref']?media.schema['$ref'].split('/').pop():(media.schema.oneOf?'oneOf ['+media.schema.oneOf.map(function(x){return x['$ref']?x['$ref'].split('/').pop():'';}).join(', ')+']':(media.schema.type||'object')))+'</div>';}
  }
  h+='<div class="sub">Responses</div><table class="params"><tr><th>Code</th><th>Description</th></tr>';
  Object.keys(op.responses||{}).forEach(function(code){var r=op.responses[code];var rr=r['$ref']?rref(r['$ref']):r;h+='<tr><td>'+esc(code)+'</td><td>'+esc(rr.description||'')+'</td></tr>';});
  h+='</table>';
  Object.keys(op.responses||{}).forEach(function(code){var r=op.responses[code];var rr=r['$ref']?rref(r['$ref']):r;var c=rr.content||{};var mt=Object.keys(c)[0];if(mt&&c[mt].examples){var exs=c[mt].examples;Object.keys(exs).forEach(function(k){var ev=exs[k];var e=ev['$ref']?rref(ev['$ref']):ev;h+='<div class="ex-label">'+code+' &middot; '+esc(e.summary||k)+'</div><pre>'+jj(e.value)+'</pre>';});}});
  h+='</div>';return h;
}
function renderStatic(){
  var root=document.getElementById('swagger-ui');var h='';
  h+='<div class="static-note">Interactive Swagger UI could not load (no network reached the CDN). Showing a static reference built from the same spec. For the interactive version, host <code>openapi.yaml</code> in your own Swagger UI, or import it into Postman / Stoplight / Insomnia.</div>';
  h+='<div class="op-desc">'+esc(spec.info.description||'')+'</div>';
  var byTag={};(spec.tags||[]).forEach(function(t){byTag[t.name]=[];});
  Object.keys(spec.paths).forEach(function(path){var methods=spec.paths[path];Object.keys(methods).forEach(function(m){var op=methods[m];var t=(op.tags&&op.tags[0])||'Other';(byTag[t]||(byTag[t]=[])).push({path:path,m:m,op:op});});});
  Object.keys(byTag).forEach(function(t){if(!byTag[t].length)return;var tg=(spec.tags||[]).filter(function(x){return x.name===t;})[0];h+='<h2 class="tag">'+esc(t)+'</h2>';if(tg&&tg.description)h+='<div class="tag-desc">'+esc(tg.description)+'</div>';byTag[t].forEach(function(o){h+=renderOp(o.path,o.m,o.op);});});
  h+='<h2 class="tag">Schemas</h2>';
  var sc=spec.components.schemas||{};
  Object.keys(sc).forEach(function(name){var s=sc[name];h+='<div class="op"><div class="op-head"><span class="schema-name">'+esc(name)+'</span></div>';if(s.description)h+='<div class="op-desc">'+esc(s.description)+'</div>';var props=s.properties;var req=s.required||[];if(!props&&s.allOf){s.allOf.forEach(function(part){if(part.properties)props=Object.assign(props||{},part.properties);if(part.required)req=req.concat(part.required);if(part['$ref']){var b=rref(part['$ref']);if(b.properties)props=Object.assign(props||{},b.properties);if(b.required)req=req.concat(b.required);}});}if(req.length)h+='<div class="op-desc"><b>required:</b> '+esc(req.join(', '))+'</div>';if(props){h+='<table class="params"><tr><th>Property</th><th>Type</th><th>Notes</th></tr>';Object.keys(props).forEach(function(pn){var pv=props[pn];var ty=pv.type||(pv['$ref']?pv['$ref'].split('/').pop():(pv.items?'array':''));h+='<tr><td>'+esc(pn)+'</td><td>'+esc(ty)+'</td><td>'+esc(pv.description||'')+'</td></tr>';});h+='</table>';}h+='</div>';});
  root.innerHTML=h;
}
boot();
